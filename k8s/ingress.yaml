apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uncia-sense
  annotations:
    # Provisions an AWS Application Load Balancer via the AWS Load Balancer
    # Controller (must be installed in the cluster — see DEPLOY.md §4).
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing       # use "internal" for VPC-only
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443},{"HTTP":80}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'

    # Replace with the ARN of your ACM certificate for the host below.
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT_ID:certificate/CERT_UUID

    # Streamlit analyses can run 30–90s. Default ALB idle timeout is 60s,
    # which would kill the WebSocket mid-stream. 180s gives comfortable headroom.
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=180

    # Sticky sessions are NOT optional for Streamlit when replicas > 1: every
    # WebSocket reconnect must land on the same pod (state lives in-process).
    # Keeping the annotation in place is harmless at replicas=1 and required
    # before scaling.
    alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.type=lb_cookie,stickiness.lb_cookie.duration_seconds=3600

    alb.ingress.kubernetes.io/healthcheck-path: /_stcore/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/success-codes: '200'
spec:
  rules:
  - host: YOUR_DOMAIN_HERE     # e.g. uncia-sense.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: uncia-sense
            port:
              number: 80
