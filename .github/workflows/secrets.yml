name: Secret scan

# Defense-in-depth against developers who forgot to install the pre-commit
# hook locally. Runs gitleaks on every push and PR; a detection fails the
# workflow and (with branch protection) blocks the merge.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 → gitleaks can scan the entire history on each
          # push, not just the latest commit. Needed to catch a secret that
          # was already on a feature branch when this workflow was added.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free for public repos. For private repos, set the GITLEAKS_LICENSE
          # secret in repo Settings → Secrets and variables → Actions.
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
