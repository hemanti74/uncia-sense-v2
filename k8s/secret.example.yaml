# TEMPLATE — DO NOT COMMIT WITH REAL VALUES.
#
# Prefer creating the Secret directly with kubectl so the keys never touch
# disk in the repo:
#
#     kubectl create secret generic uncia-sense-secrets \
#         --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#         --from-literal=DEEPSEEK_API_KEY=""
#
# If you do prefer a manifest, copy this file to `secret.yaml` (already
# git-ignored via the project .gitignore — add it yourself if not), fill in
# the values, and `kubectl apply -f k8s/secret.yaml`.
apiVersion: v1
kind: Secret
metadata:
  name: uncia-sense-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  DEEPSEEK_API_KEY: ""   # optional; leave empty when only Anthropic is used
